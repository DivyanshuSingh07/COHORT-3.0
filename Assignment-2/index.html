<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScaleX</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">

        <div class="logo">
            <img src="Assets/logo.png" alt="ScaleX">
            <h2>ScaleX</h2>
        </div>

        <ul class="nav">
            <li>Home</li>
            <li>About Us</li>
            <li>Blogs</li>
            <li>Contact Us</li>
        </ul>

        <button class="start-btn">Get Started</button>

    </header>

    <section class="hero">

        <h1>Insights & Blogs</h1>

        <div class="filters">

            <button class="active">All</button>
            <button>Tech</button>
            <button>SaaS</button>
            <button>Marketing</button>

        </div>

    </section>

    <section class="container">

        <div class="card">

            <img src="Assets/drink.png" alt="wine glass">

            <div class="card-content">

                <span class="tag">Tech</span>

                <h2>
                    The Ultimate Guide To SaaS Marketing
                </h2>

                <p>May 23, 2025</p>

            </div>

        </div>

        <div class="card">

            <img src="Assets/chair.png" alt="chair">

            <div class="card-content">

                <span class="tag">SaaS</span>

                <h2>
                    5 Key Trends In SaaS Growth For 2025
                </h2>

                <p>May 23, 2025</p>

            </div>

        </div>

        <div class="card">

            <img src="Assets/cat.png" alt="cat">

            <div class="card-content">

                <span class="tag">Marketing</span>

                <h2>
                    How Data-Driven Strategies Are Important
                </h2>

                <p>May 23, 2025</p>

            </div>

        </div>

    </section>

</body>
</html>
