<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NFT Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="top">

    <h2>Explore Art Work</h2>

    <p>See All</p>

  </div>


  <div class="container">

    <div class="card">

      <img src="assets/monocular.png" alt="Monocular">

      <div class="info">

        <h3>Monocular</h3>

        <div class="likes">
          <span>54.8k</span>
          ♡
        </div>

      </div>

      <button class="bid-btn">Place Bid</button>

    </div>

    <div class="card">

      <img src="assets/horns_mask.png" alt="Horns Mask">

      <div class="info">

        <h3>Horns Mask</h3>

        <div class="likes">
          <span>32.4k</span>
          ♡
        </div>

      </div>

      <button class="bid-btn">Place Bid</button>

    </div>


    <div class="card">

      <img src="assets/light_moon.png" alt="Light Moon">

      <div class="info">

        <h3>Light Moon</h3>

        <div class="likes">
          <span>86.8k</span>
          ♡
        </div>

      </div>

      <button class="bid-btn">Place Bid</button>

    </div>

    <div class="card">

      <img src="assets/skull_wire.png" alt="Skull Wire">

      <div class="info">

        <h3>Skull Wire</h3>

        <div class="likes">
          <span>78.9k</span>
          ♡
        </div>

      </div>

      <button class="bid-btn">Place Bid</button>

    </div>

    <div class="card">

      <img src="assets/spiderman.png" alt="Spiderman">

      <div class="info">

        <h3>Spiderman</h3>

        <div class="likes">
          <span>24.8k</span>
          ♡
        </div>

      </div>

      <button class="bid-btn">Place Bid</button>

    </div>

    <div class="card">

      <img src="assets/deadpool.png" alt="Deadpool">

      <div class="info">

        <h3>DeadPool</h3>

        <div class="likes">
          <span>59.7k</span>
          ♡
        </div>

      </div>

      <button class="bid-btn">Place Bid</button>

    </div>

    <div class="card">

      <img src="assets/white_eye.png" alt="White Eye">

      <div class="info">

        <h3>White Eye</h3>

        <div class="likes">
          <span>45.7k</span>
          ♡
        </div>

      </div>

      <button class="bid-btn">Place Bid</button>

    </div>

    <div class="card">

      <img src="assets/plastic_spinal.png" alt="Plastic Spinal">

      <div class="info">

        <h3>Plastic Spinal</h3>

        <div class="likes">
          <span>98.6k</span>
          ♡
        </div>

      </div>

      <button class="bid-btn">Place Bid</button>

    </div>

  </div>

</body>
</html>
